<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d2137">
<title>Manutenção Periódica</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --primary: #0d2137;
  --primary2: #1a3a5c;
  --accent: #e8a020;
  --ok: #27ae60;
  --warn: #e67e22;
  --danger: #e74c3c;
  --info: #2980b9;
  --bg: #eef0f5;
  --card: #ffffff;
  --text: #2c3e50;
  --muted: #7f8c8d;
  --border: #dde1e8;
  --nav-h: 66px;
  --r: 16px;
  --r-sm: 10px;
  --shadow: 0 2px 14px rgba(13,33,55,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
body{max-width:430px;margin:0 auto;position:relative;overflow-x:hidden}
/* HEADER */
#hdr{background:linear-gradient(160deg,var(--primary) 0%,var(--primary2) 100%);color:white;padding:48px 20px 16px;position:sticky;top:0;z-index:100}
.hdr-in{display:flex;justify-content:space-between;align-items:flex-end}
.hdr-title{font-size:21px;font-weight:800;letter-spacing:-0.3px}
.hdr-date{font-size:12px;opacity:0.75;margin-top:2px}
.hdr-pill{background:var(--danger);color:white;font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;white-space:nowrap}
/* PAGES */
.page{display:none;padding:14px;padding-bottom:calc(var(--nav-h) + 20px);animation:fi .2s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
/* BOTTOM NAV */
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nav-h);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:999;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -4px 24px rgba(0,0,0,.07)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;position:relative;transition:all .2s}
.nb .ni{font-size:21px}
.nb .nl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.3px;text-transform:uppercase}
.nb.active .nl{color:var(--accent)}
.nb.active .ni{transform:scale(1.1)}
.nbadge{position:absolute;top:6px;right:18px;background:var(--danger);color:white;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
/* SECTION TITLE */
.stitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin:14px 0 8px}
/* CARDS */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
/* ALERT BANNERS */
.abanner{border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
.ab-d{background:linear-gradient(135deg,#e74c3c,#c0392b);color:white}
.ab-w{background:linear-gradient(135deg,#e67e22,#d35400);color:white}
.ab-i{background:linear-gradient(135deg,#2980b9,#1a6fa0);color:white}
.ab-icon{font-size:24px;flex-shrink:0;line-height:1.3}
.ab-body h3{font-size:14px;font-weight:700}
.ab-body p{font-size:12px;opacity:.9;margin-top:3px;line-height:1.5}
/* SUMMARY STATS */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sbox{background:var(--card);border-radius:var(--r-sm);padding:12px;text-align:center;box-shadow:var(--shadow)}
.snum{font-size:28px;font-weight:800;line-height:1}
.slbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
/* VEHICLE CARD HOME */
.vch{padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer}
.vicon{font-size:34px;width:58px;height:58px;display:flex;align-items:center;justify-content:center;border-radius:14px;flex-shrink:0}
.vinfo{flex:1;min-width:0}
.vname{font-size:15px;font-weight:700}
.vsub{font-size:12px;color:var(--muted);margin-top:1px}
.vchips{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.cd{background:#fdecea;color:var(--danger)}
.cw{background:#fef5e7;color:var(--warn)}
.co{background:#eafaf1;color:var(--ok)}
.ci{background:#eaf3fb;color:var(--info)}
.cg{background:#f0f2f5;color:var(--muted)}
/* VEHICLE BODY */
.vbody{display:none;padding:0 0 6px}
.vbody.open{display:block}
/* SPECS */
.specsg{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:4px 16px 12px}
.sbox2{background:#f8f9fa;border-radius:var(--r-sm);padding:8px 10px}
.slabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.sval{font-size:13px;font-weight:600;margin-top:1px}
/* MAINTENANCE ITEMS */
.mitem{border-bottom:1px solid var(--border)}
.mitem:last-child{border-bottom:none}
.mhdr{padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.mname{flex:1;font-size:14px;font-weight:600}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.bd{background:#fdecea;color:var(--danger)}
.bw{background:#fef5e7;color:var(--warn)}
.bo{background:#eafaf1;color:var(--ok)}
.bg{background:#f0f2f5;color:var(--muted)}
.mdetail{display:none;padding:12px 16px 14px;background:#fafbfc;border-top:1px solid var(--border);font-size:13px}
.mdetail.open{display:block}
.dgrid{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;margin-bottom:10px}
.dl{color:var(--muted);font-size:12px}
.dv{font-weight:600;font-size:12px}
.descbox{background:#f0f2f5;border-radius:var(--r-sm);padding:10px 12px;font-size:12px;color:var(--text);line-height:1.6}
.parts-list{margin-top:8px;padding-left:4px}
.parts-list li{font-size:12px;color:var(--muted);padding:2px 0;list-style:none;padding-left:14px;position:relative}
.parts-list li::before{content:'•';position:absolute;left:0;color:var(--accent)}
.btn-done{display:inline-flex;align-items:center;gap:6px;background:var(--ok);color:white;border:none;border-radius:var(--r-sm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;transition:opacity .2s;-webkit-appearance:none}
.btn-done:active{opacity:.8}
.btn-done.done-now{background:var(--muted)}
/* VEHICLE SELECTOR */
.vsel{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.vsel::-webkit-scrollbar{display:none}
.vchip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;background:var(--card);border:2px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}
.vchip.active{background:var(--primary);border-color:var(--primary);color:white}
/* TOGGLE ICON */
.ti{transition:transform .3s;color:var(--muted);font-size:13px}
.ti.open{transform:rotate(180deg)}
/* IPVA */
.ipva-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
.ipva-row:last-child{border-bottom:none}
.ipva-lbl{font-size:13px;color:var(--muted)}
.ipva-val{font-size:13px;font-weight:700}
/* FORECAST */
.fcm{margin-bottom:18px}
.fcmtitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;padding-left:4px}
.fci{display:flex;background:var(--card);border-radius:var(--r-sm);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.fcstripe{width:5px;flex-shrink:0}
.fcstripe-d{background:var(--danger)}
.fcstripe-w{background:var(--warn)}
.fcstripe-o{background:var(--ok)}
.fcstripe-i{background:var(--info)}
.fcbody{padding:10px 12px;flex:1}
.fctitle{font-size:13px;font-weight:700}
.fcsub{font-size:12px;color:var(--muted);margin-top:2px}
/* INFO NOTE */
.inote{background:#eaf3fb;border-left:3px solid var(--info);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 12px;font-size:12px;color:#1a5276;margin-bottom:12px;line-height:1.6}
/* DIVIDER LABEL */
.dvlbl{display:flex;align-items:center;gap:8px;margin:10px 0 6px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.dvlbl::after{content:'';flex:1;height:1px;background:var(--border)}
/* HEADER vehicle section */
.vcard-sec-hdr{padding:10px 16px;background:#f5f7fa;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
/* STATUS indicator for done items */
.done-since{font-size:11px;color:var(--ok);display:flex;align-items:center;gap:4px;margin-top:4px}
/* SYNC DOT */
.sync-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:background .4s}
/* SETTINGS MODAL */
.smodal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:none;align-items:flex-end;justify-content:center}
.smodal-sheet{background:white;border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,24px);width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.smodal-hdr{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.smodal-hdr h2{font-size:17px;font-weight:800}
.smodal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
.smodal-sec{padding:16px 20px}
.smodal-sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.srow-info{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:14px}
.srow-info:last-child{border-bottom:none}
.srow-label{color:var(--muted)}
.srow-val{font-weight:700}
.step-box{background:#f8f9fa;border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.7;margin-bottom:10px;color:var(--text)}
.step-box strong{color:var(--primary)}
.step-box code{background:#e8eaf0;border-radius:4px;padding:1px 5px;font-family:monospace;font-size:12px}
/* CALENDAR BUTTONS */
.cal-btns{display:flex;gap:6px;padding:6px 12px 10px}
.cal-btn{flex:1;padding:7px 6px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}
.cal-g{background:#4285f4;color:white}
.cal-a{background:#1c1c1e;color:white}
.export-all-btn{display:flex;align-items:center;gap:8px;background:var(--primary);color:white;border:none;border-radius:var(--r-sm);padding:11px 16px;font-size:13px;font-weight:700;cursor:pointer;width:100%;justify-content:center;margin-bottom:14px}
</style>
</head>
<body>

<header id="hdr">
  <div class="hdr-in">
    <div>
      <div class="hdr-title">🔧 Manutenção</div>
      <div class="hdr-date" id="hdrdate"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="hdralert"></div>
      <span id="sync-status" class="sync-dot" style="background:rgba(255,255,255,.25)" title="Sem sincronização automática"></span>
      <button onclick="openSettings()" title="Configurações" style="background:rgba(255,255,255,.15);border:none;color:white;border-radius:10px;padding:7px 10px;font-size:18px;cursor:pointer;line-height:1">⚙️</button>
    </div>
  </div>
</header>

<main>
  <div id="pg-home" class="page active"></div>
  <div id="pg-manut" class="page"></div>
  <div id="pg-ipva" class="page"></div>
  <div id="pg-alerta" class="page"></div>
</main>

<nav id="bnav">
  <div class="nb active" data-p="home"><span class="ni">🏠</span><span class="nl">Início</span></div>
  <div class="nb" data-p="manut"><span class="ni">🔧</span><span class="nl">Manutenção</span><span class="nbadge" id="nb-manut"></span></div>
  <div class="nb" data-p="ipva"><span class="ni">📋</span><span class="nl">IPVA</span><span class="nbadge" id="nb-ipva"></span></div>
  <div class="nb" data-p="alerta"><span class="ni">📅</span><span class="nl">Alertas</span></div>
</nav>

<!-- SETTINGS MODAL -->
<div id="smodal" class="smodal-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="smodal-sheet">
    <div class="smodal-hdr">
      <h2>⚙️ Configurações</h2>
      <button class="smodal-close" onclick="closeSettings()">✕</button>
    </div>
    <div id="smodal-body"></div>
  </div>
</div>

<!-- MARK-DONE MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:flex-end;justify-content:center">
  <div style="background:white;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:430px">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px" id="modal-title">Marcar como Feita</div>
    <div id="modal-date-wrap">
      <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:4px">Data realizada</label>
      <input type="month" id="modal-date" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:12px">
    </div>
    <div id="modal-km-wrap">
      <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:4px">Quilometragem (km)</label>
      <input type="number" id="modal-km" placeholder="Ex: 60000" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:12px">
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="closeModal()" style="flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:white;font-size:15px;cursor:pointer">Cancelar</button>
      <button onclick="saveModal()" style="flex:2;padding:12px;border:none;border-radius:10px;background:var(--ok);color:white;font-size:15px;font-weight:700;cursor:pointer">✅ Confirmar</button>
    </div>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────

const STORE_KEY = 'manutv2';
let state = JSON.parse(localStorage.getItem(STORE_KEY) || '{"done":{}}');
function saveState(){
  state._ts = Date.now();
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  pushSync();
}

// Dynamic vehicle km/hours (falls back to hardcoded defaults)
function getVehicleKm(v){
  return (state.vehicles && state.vehicles[v.id] && state.vehicles[v.id].currentKm != null)
    ? state.vehicles[v.id].currentKm : v.currentKm;
}
function getVehicleHours(v){
  return (state.vehicles && state.vehicles[v.id] && state.vehicles[v.id].currentHours != null)
    ? state.vehicles[v.id].currentHours : v.currentHours;
}

// Recalculate item status dynamically based on when it was last done + intervals
function calcItemStatus(v, m){
  const done = state.done[m.id];
  if(!done) return m.status;
  const curKm = getVehicleKm(v);
  const curH  = getVehicleHours(v);
  if(v.hasKm && m.intervalKm && done.doneKm != null){
    const next = done.doneKm + m.intervalKm;
    if(curKm >= next) return 'vencida';
    if(curKm >= next - m.intervalKm * 0.15) return 'atencao';
    return 'ok';
  }
  if(v.hasHours && m.intervalH && done.doneH != null){
    const next = done.doneH + m.intervalH;
    if(curH >= next) return 'vencida';
    if(curH >= next - m.intervalH * 0.15) return 'atencao';
    return 'ok';
  }
  if(m.intervalMonths){
    const nextDate = addMonths(new Date(done.ts), m.intervalMonths);
    const daysLeft = Math.floor((nextDate - TODAY) / 86400000);
    if(daysLeft <= 0) return 'vencida';
    if(daysLeft <= 30) return 'atencao';
    return 'ok';
  }
  return 'ok';
}

// Build next-service details string for display
function getNextInfo(v, m){
  const done = state.done[m.id];
  if(!done) return null;
  const curKm = getVehicleKm(v);
  const curH  = getVehicleHours(v);
  const parts = [];
  if(v.hasKm && m.intervalKm && done.doneKm != null){
    const next = done.doneKm + m.intervalKm;
    const left = next - curKm;
    parts.push('Próximo: '+next.toLocaleString('pt-BR')+'km '+(left>0?'(faltam '+left.toLocaleString('pt-BR')+'km)':'(VENCIDA)'));
  }
  if(v.hasHours && m.intervalH && done.doneH != null){
    const next = done.doneH + m.intervalH;
    const left = next - curH;
    parts.push('Próximo: '+next+'h '+(left>0?'(faltam '+left+'h)':'(VENCIDA)'));
  }
  if(m.intervalMonths){
    const nextDate = addMonths(new Date(done.ts), m.intervalMonths);
    const daysLeft = Math.floor((nextDate - TODAY) / 86400000);
    parts.push('Próximo: '+fmtDate(nextDate)+(daysLeft>0?' (em '+(daysLeft>=30?Math.round(daysLeft/30)+' mês(es)':daysLeft+' dias')+')':' (VENCIDA)'));
  }
  return parts.length ? parts.join(' • ') : null;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────

let modalItemId = null;
let modalVehicleId = null;

function statusLabel(s){
  const map = {vencida:'Vencida',atencao:'Atenção',ok:'Em dia',verificar:'Verificar',rotina:'Rotina'};
  return map[s]||s;
}
function statusClass(s){
  const map = {vencida:'bd',atencao:'bw',ok:'bo',verificar:'bg',rotina:'bg'};
  return map[s]||'bg';
}
function chipClass(s){
  const map = {vencida:'cd',atencao:'cw',ok:'co',verificar:'cg',rotina:'cg'};
  return map[s]||'cg';
}

function countByStatus(v){
  const counts = {vencida:0,atencao:0,ok:0,verificar:0,rotina:0};
  v.maintenance.forEach(m=>{
    const s = calcItemStatus(v, m);
    counts[s] = (counts[s]||0)+1;
  });
  return counts;
}

function totalVencidas(){
  let n=0;
  VEHICLES.forEach(v=>v.maintenance.forEach(m=>{
    if(calcItemStatus(v,m)==='vencida') n++;
  }));
  return n;
}
function totalAtencao(){
  let n=0;
  VEHICLES.forEach(v=>v.maintenance.forEach(m=>{
    if(calcItemStatus(v,m)==='atencao') n++;
  }));
  return n;
}
function totalIPVAVencidas(){
  let n=0;
  VEHICLES.forEach(v=>{
    if(v.hasIPVA){
      const st = ipvaStatus(v);
      if(st==='vencida') n++;
    }
  });
  return n;
}

function boatRegStatus(){
  if(state.ipva && state.ipva['barco_marinha']) return 'pago';
  return 'verificar';
}

function markBoatRegPago(){
  if(!state.ipva) state.ipva = {};
  if(state.ipva['barco_marinha']){
    delete state.ipva['barco_marinha'];
  } else {
    const now = TODAY;
    state.ipva['barco_marinha'] = {paidAt: MS[now.getMonth()]+'/'+now.getFullYear(), ts: Date.now()};
  }
  saveState();
  renderAll();
  showPage('ipva');
}

function ipvaStatus(v){
  if(!v.hasIPVA) return null;
  const allPaid = v.ipvaTypes.every(t => state.ipva && state.ipva[v.id+'_'+t]);
  if(allPaid) return 'pago';
  let worst = 'ok';
  v.ipvaTypes.forEach(tipo => {
    if(state.ipva && state.ipva[v.id+'_'+tipo]) return;
    const iso = autoVencISO(v, false, tipo);
    const days = Math.floor((new Date(iso+'T00:00:00') - TODAY) / 86400000);
    if(days < 0 && worst !== 'vencida') worst = 'vencida';
    else if(days >= 0 && days <= 60 && worst === 'ok') worst = 'atencao';
  });
  return worst;
}

function ipvaMonthStr(v){
  return MF[v.ipvaMonth-1]+' '+TODAY.getFullYear();
}

function fmtDateBR(iso){
  if(!iso) return null;
  const [y,m,d] = iso.split('-');
  return d+'/'+m+'/'+y;
}

function autoVencISO(v, nextYear, tipo){
  const month = tipo === 'licenc' ? (v.licencMonth || v.ipvaMonth) : v.ipvaMonth;
  const y = nextYear ? TODAY.getFullYear()+1 : TODAY.getFullYear();
  const lastDay = new Date(y, month, 0).getDate();
  return `${y}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
}

function vencCountdown(iso, pago){
  if(!iso) return null;
  if(pago) return `<span style="color:var(--ok)">✅ Pago</span>`;
  const d = new Date(iso+'T00:00:00');
  const days = Math.floor((d - TODAY) / 86400000);
  const date = fmtDateBR(iso);
  if(days < 0)  return `${date} <span style="color:var(--danger);font-weight:700">⚠️ Venceu há ${-days} dia(s)</span>`;
  if(days === 0) return `${date} <span style="color:var(--danger);font-weight:700">⚠️ Vence HOJE!</span>`;
  if(days <= 7)  return `${date} <span style="color:var(--danger);font-weight:700">⚠️ Faltam ${days} dias</span>`;
  if(days <= 30) return `${date} <span style="color:var(--warn);font-weight:700">🟡 Faltam ${days} dias</span>`;
  return `${date} <span style="color:var(--ok)">✅ Faltam ${days} dias</span>`;
}

function saveModal(){
  if(modalType==='vehicle'){
    const val = parseInt(document.getElementById('modal-km').value);
    if(!val || val <= 0){ alert('Informe um valor válido.'); return; }
    if(!state.vehicles) state.vehicles={};
    if(!state.vehicles[modalVehicleId]) state.vehicles[modalVehicleId]={};
    const v = VEHICLES.find(x=>x.id===modalVehicleId);
    if(v.hasKm) state.vehicles[modalVehicleId].currentKm = val;
    else if(v.hasHours) state.vehicles[modalVehicleId].currentHours = val;
    saveState();
    closeModal();
    renderAll();
    renderMaintenance();
    return;
  }
  if(modalType==='ipvavenc'){
    const dateVal = document.getElementById('modal-date').value;
    if(!dateVal){ alert('Informe a data'); return; }
    if(!state.ipva) state.ipva={};
    state.ipva[modalIPVAKey] = dateVal;
    document.getElementById('modal-date').type = 'month';
    saveState();
    closeModal();
    renderAll();
    showPage('ipva');
    return;
  }
  const date = document.getElementById('modal-date').value;
  if(!date){alert('Informe a data');return;}
  const [y,m] = date.split('-');
  let label = MS[parseInt(m)-1]+'/'+y;
  if(modalType==='ipva'){
    if(!state.ipva) state.ipva={};
    state.ipva[modalIPVAKey] = {paidAt: label, ts: Date.now()};
    saveState();
    closeModal();
    renderAll();
    showPage('ipva');
  } else {
    const v = VEHICLES.find(x=>x.id===modalVehicleId);
    const km = document.getElementById('modal-km').value;
    const doneKm = (v && v.hasKm && km) ? parseInt(km) : null;
    const doneH  = (v && v.hasHours) ? getVehicleHours(v) : null;
    if(km) label += ' • '+parseInt(km).toLocaleString('pt-BR')+'km';
    if(!km && doneH) label += ' • '+doneH+'h';
    state.done[modalItemId] = {doneAt: label, doneKm, doneH, ts: Date.now()};
    saveState();
    closeModal();
    renderAll();
    renderMaintenance();
  }
}

// ── RENDER FORECAST ───────────────────────────────────────────────────────────

function renderForecast(){
  const end = addMonths(TODAY, 6);

  // Build events
  const events = [];

  // IPVA / Licenciamento
  VEHICLES.filter(v=>v.hasIPVA).forEach(v=>{
    if(ipvaStatus(v)==='pago') return;
    v.ipvaTypes.forEach(tipo => {
      const paid = state.ipva && state.ipva[v.id+'_'+tipo];
      if(paid) return;
      const dueISO = autoVencISO(v, false, tipo);
      const dueDate = new Date(dueISO+'T00:00:00');
      const days = Math.floor((dueDate - TODAY) / 86400000);
      const month = tipo === 'licenc' ? (v.licencMonth||v.ipvaMonth) : v.ipvaMonth;
      const monthKey = `${TODAY.getFullYear()}-${String(month).padStart(2,'0')}`;
      const label = tipo === 'ipva' ? 'IPVA' : 'Licenciamento (CRLV)';
      if(days < 0){
        events.push({
          date: dueDate, monthKey,
          title:`${label} — Regularizar`,
          sub:`${v.icon} ${v.name} • Placa final ${v.plateEnd} • Venceu em ${fmtDateBR(dueISO)}`,
          level:'danger', past:true
        });
      } else if(days <= 180){
        events.push({
          date: dueDate, monthKey,
          title: label,
          sub:`${v.icon} ${v.name} • Placa final ${v.plateEnd} • ${fmtDateBR(dueISO)} • ${vencCountdown(dueISO, false)}`,
          level: days <= 60 ? 'warn' : 'info'
        });
      }
    });
  });

  // Maintenance due NOW (vencidas)
  VEHICLES.forEach(v=>{
    v.maintenance.forEach(m=>{
      if(state.done[m.id]) return;
      if(m.status==='vencida'){
        events.push({
          date: new Date(TODAY),
          monthKey: `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`,
          title: m.name,
          sub: `${v.icon} ${v.name} — VENCIDA`,
          level:'danger',
          past:true
        });
      }
    });
  });

  // Lander km forecast
  const lander = VEHICLES.find(x=>x.id==='lander');
  const kmIntervals = [
    {name:'Troca de Óleo + Corrente',km:3000,baseKm:60000},
    {name:'Filtro de Ar (limpeza) + Verificação Vela',km:6000,baseKm:60000},
    {name:'Troca de Óleo',km:3000,baseKm:63000},
    {name:'Troca de Óleo + Filtro Ar + Vela',km:12000,baseKm:60000},
  ];
  kmIntervals.forEach(item=>{
    const nextKm = item.baseKm + item.km;
    const currentKm = lander.currentKm;
    const kmNeeded = nextKm - currentKm;
    if(kmNeeded <= 0) return;
    const monthsNeeded = kmNeeded / lander.avgKmMonth;
    const dt = addMonths(TODAY, Math.round(monthsNeeded));
    if(dt <= end){
      const mk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
      events.push({
        date:dt,
        monthKey:mk,
        title:item.name,
        sub:`🏍️ Yamaha Lander 250 • ~${nextKm.toLocaleString('pt-BR')}km`,
        level:'warn'
      });
    }
  });

  // F60 100h service forecast
  const f60 = VEHICLES.find(x=>x.id==='f60');
  const f60NextH = 100;
  const f60HNeeded = f60NextH - f60.currentHours;
  const f60Months = f60HNeeded / f60.avgHoursMonth;
  const f60Date = addMonths(TODAY, Math.round(f60Months));
  if(f60Date <= end){
    const mk = `${f60Date.getFullYear()}-${String(f60Date.getMonth()+1).padStart(2,'0')}`;
    events.push({
      date:f60Date,
      monthKey:mk,
      title:'Revisão 100 Horas (OBRIGATÓRIA)',
      sub:'⛵ Motor Yamaha F60 • Óleo, filtro, velas, zincos, pé',
      level:'danger'
    });
  }

  // FourTrax annual
  const ftDate = addMonths(TODAY, 4);
  if(ftDate <= end){
    const mk = `${ftDate.getFullYear()}-${String(ftDate.getMonth()+1).padStart(2,'0')}`;
    events.push({
      date:ftDate,
      monthKey:mk,
      title:'Revisão Anual — Verificar e agendar',
      sub:'🚜 Quadriciclo FourTrax 4×4 • Óleo, filtro, diferencial',
      level:'info'
    });
  }

  // Carreta barco rolamentos
  const cbDate = addMonths(TODAY, 3);
  const cbMk = `${cbDate.getFullYear()}-${String(cbDate.getMonth()+1).padStart(2,'0')}`;
  events.push({
    date:cbDate,
    monthKey:cbMk,
    title:'Reempacotar Rolamentos das Rodas',
    sub:'🛥️ Carreta do Barco • Graxa marítima obrigatória',
    level:'warn'
  });

  // Carreta rod lubrificacao
  const crDate = addMonths(TODAY, 3);
  const crMk = `${crDate.getFullYear()}-${String(crDate.getMonth()+1).padStart(2,'0')}`;
  events.push({
    date:crDate,
    monthKey:crMk,
    title:'Lubrificação Quinta-Roda + Revisão Geral',
    sub:'🚛 Carreta Rodoviária • Graxa, freios, luzes',
    level:'info'
  });

  // Sort by date
  events.sort((a,b)=>a.date-b.date);
  _forecastEvents = events;

  // Group by month
  const monthGroups = {};
  const monthOrder = [];
  events.forEach(e=>{
    if(!monthGroups[e.monthKey]){
      monthGroups[e.monthKey]=[];
      monthOrder.push(e.monthKey);
    }
    monthGroups[e.monthKey].push(e);
  });

  let html = '';

  // Urgente / já vencidas
  const vencidas = events.filter(e=>e.past);
  if(vencidas.length>0){
    html += `<div class="abanner ab-d"><span class="ab-icon">🚨</span><div class="ab-body"><h3>${vencidas.length} item(ns) já vencidos!</h3><p>Itens abaixo de manutenção e IPVA já passaram do prazo. Regularize o mais rápido possível.</p></div></div>`;
  }

  html += `<div class="inote">📅 Previsão para os próximos 6 meses baseada em: Lander ~1.500km/mês • Motor F60 ~8h/mês. Ajuste conforme seu uso real.</div>`;

  html += `<button class="export-all-btn" onclick="exportAllICS()">📆 Exportar Todos para Calendário (.ics)</button>`;

  html += `<div class="stitle">Cronograma Jun–Dez 2026</div>`;

  const uniqueMonths = [...new Set(monthOrder)];
  let evIdx = 0;
  uniqueMonths.forEach(mk=>{
    const [y,m] = mk.split('-');
    const isPast = parseInt(y) < TODAY.getFullYear() || (parseInt(y)===TODAY.getFullYear() && parseInt(m) < TODAY.getMonth()+1);
    const isCurrent = parseInt(y)===TODAY.getFullYear() && parseInt(m)===TODAY.getMonth()+1;
    html += `<div class="fcm">
      <div class="fcmtitle">${isPast?'⚠️ ':isCurrent?'📍 ':''}${MF[parseInt(m)-1]} ${y}${isPast?' — VENCIDO':isCurrent?' — Agora':''}</div>`;
    monthGroups[mk].forEach(e=>{
      const i = evIdx++;
      html += `<div class="fci">
        <div class="fcstripe fcstripe-${e.level}"></div>
        <div style="flex:1;min-width:0">
          <div class="fcbody">
            <div class="fctitle">${e.title}</div>
            <div class="fcsub">${e.sub}</div>
          </div>
          <div class="cal-btns">
            <button class="cal-btn cal-g" onclick="addGoogleCal(${i})">📅 Google</button>
            <button class="cal-btn cal-a" onclick="exportSingleICS(${i})">🍎 Apple</button>
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('pg-alerta').innerHTML = html;
}

// ── FIREBASE SYNC ─────────────────────────────────────────────────────────────

const FB_CONFIG_KEY = 'fb_config_v1';
const SYNC_KEY_KEY  = 'sync_key_v1';
let _fbApp = null, _fbDb = null, _fbUnsub = null, _syncKey = null;

function initFirebase(){
  const stored = localStorage.getItem(FB_CONFIG_KEY);
  if(!stored) return;
  try { _initFb(JSON.parse(stored)); } catch(e){}
}

function _initFb(cfg){
  try {
    if(!_fbApp) _fbApp = firebase.initializeApp(cfg);
    _fbDb = firebase.firestore(_fbApp);
    _syncKey = localStorage.getItem(SYNC_KEY_KEY);
    if(!_syncKey){
      _syncKey = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)+Date.now().toString(36));
      localStorage.setItem(SYNC_KEY_KEY, _syncKey);
    }
    updateSyncStatus('connecting');
    startSync();
  } catch(e){ updateSyncStatus('error'); }
}

function startSync(){
  if(!_fbDb || !_syncKey) return;
  if(_fbUnsub){ _fbUnsub(); _fbUnsub=null; }
  _fbUnsub = _fbDb.collection('manut').doc(_syncKey).onSnapshot(snap=>{
    if(!snap.exists){ updateSyncStatus('ok'); return; }
    if(snap.metadata.hasPendingWrites){ return; }
    const remote = snap.data();
    if(remote._ts && state._ts && remote._ts <= state._ts){ updateSyncStatus('ok'); return; }
    state = remote;
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    renderAll();
    const cur = document.querySelector('.nb.active');
    if(cur){
      if(cur.dataset.p==='manut') renderMaintenance();
      else if(cur.dataset.p==='ipva') renderIPVA();
      else if(cur.dataset.p==='alerta') renderForecast();
    }
    updateSyncStatus('ok');
    showSyncToast('🔄 Sincronizado com outro dispositivo!');
  }, ()=>{ updateSyncStatus('error'); });
}

function pushSync(){
  if(!_fbDb || !_syncKey) return;
  _fbDb.collection('manut').doc(_syncKey).set(state)
    .then(()=>updateSyncStatus('ok'))
    .catch(()=>updateSyncStatus('error'));
}

function updateSyncStatus(s){
  const dot = document.getElementById('sync-status');
  if(!dot) return;
  const map = {ok:'#27ae60',connecting:'#e67e22',error:'#e74c3c'};
  dot.style.background = map[s] || 'rgba(255,255,255,.25)';
  dot.title = s==='ok'?'Sincronizado':s==='connecting'?'Conectando…':s==='error'?'Erro de sincronização':'Sem sincronização automática';
}

    <div class="smodal-sec" style="border-top:1px solid var(--border)">
      <div class="smodal-sec-title">Sincronização Manual (sem Firebase)</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px">Gere um link com os dados para abrir em outro dispositivo.</p>
      <button onclick="exportData();closeSettings()" style="width:100%;padding:11px;border:none;border-radius:8px;background:var(--primary2);color:white;font-size:14px;font-weight:600;cursor:pointer">📤 Exportar Link de Dados</button>
    </div>
  `;
}

function _parseFbInput(raw){
  let s = raw.trim();
  // Extract the {...} block (handles "const firebaseConfig = { ... };")
  const m = s.match(/\{[\s\S]*\}/);
  if(m) s = m[0];
  // Try standard JSON
  try { return JSON.parse(s); } catch(e){}
  // Convert JS object literal → JSON: quote unquoted keys
  const asJson = s
    .replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)(\s*:)/g, '$1"$2"$3')
    .replace(/'/g, '"');
  try { return JSON.parse(asJson); } catch(e){ return null; }
}

function _connectFb(){
  const val = (document.getElementById('fb-cfg-input')||{}).value||'';
  if(!val.trim()){ alert('Cole a configuração do Firebase primeiro.'); return; }
  const cfg = _parseFbInput(val);
  if(!cfg){ alert('Não foi possível ler a configuração. Copie exatamente o bloco { apiKey: ... } do Firebase.'); return; }
  const cfgJson = JSON.stringify(cfg);
  localStorage.setItem(FB_CONFIG_KEY, cfgJson);
  _initFb(cfg);
  _renderSettings();
  showSyncToast('🔥 Firebase conectado!');
}

function _disconnectFb(){
  if(!confirm('Desconectar o Firebase? Os dados locais serão mantidos.')) return;
  if(_fbUnsub){ _fbUnsub(); _fbUnsub=null; }
  _fbApp=null; _fbDb=null; _syncKey=null;
  localStorage.removeItem(FB_CONFIG_KEY);
  localStorage.removeItem(SYNC_KEY_KEY);
  updateSyncStatus('off');
  _renderSettings();
  showSyncToast('Firebase desconectado.');
}

function _copyKey(){
  if(!_syncKey) return;
  navigator.clipboard.writeText(_syncKey).then(()=>{
    showSyncToast('📋 Chave copiada! Em outro dispositivo: Configurações → Usar Outra → cole a chave.');
  }).catch(()=>{ prompt('Chave de sincronização:', _syncKey); });
}

function _changeKey(){
  const k = prompt('Cole a chave do outro dispositivo (ou deixe em branco para gerar nova):', '');
  if(k===null) return;
  _syncKey = k.trim() || (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)+Date.now().toString(36));
  localStorage.setItem(SYNC_KEY_KEY, _syncKey);
  if(_fbDb) startSync();
  _renderSettings();
}

// ── MANUAL SYNC (legacy, now accessible via settings) ─────────────────────────

function exportData(){
  const json = JSON.stringify(state);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  const url = location.origin + location.pathname + '#sync=' + b64;
  navigator.clipboard.writeText(url).then(()=>{
    showSyncToast('📋 Link copiado! Cole no outro dispositivo.');
  }).catch(()=>{ prompt('Copie este link e abra no outro dispositivo:', url); });
}

function importFromHash(){
  const hash = location.hash;
  if(!hash.startsWith('#sync=')) return;
  try {
    const b64 = hash.slice(6);
    const json = decodeURIComponent(escape(atob(b64)));
    const imported = JSON.parse(json);
    state = imported;
    saveState();
    history.replaceState(null,'',location.pathname);
    showSyncToast('✅ Dados importados com sucesso!');
    renderAll();
  } catch(e){ showSyncToast('❌ Erro ao importar dados.'); }
}

function showSyncToast(msg){
  let t = document.getElementById('sync-toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'sync-toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2c3e50;color:white;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:3000;max-width:360px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.3)';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, 3500);
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────

let _forecastEvents = [];

function _fmtISODate(d){
  return d.getFullYear().toString()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}

function addGoogleCal(i){
  const e = _forecastEvents[i];
  if(!e) return;
  const d = _fmtISODate(e.date);
  const url = 'https://calendar.google.com/calendar/r/eventedit?text='+encodeURIComponent('🔧 '+e.title)+'&dates='+d+'/'+d+'&details='+encodeURIComponent(e.sub)+'&sf=true';
  window.open(url,'_blank');
}

function exportSingleICS(i){
  const e = _forecastEvents[i];
  if(!e) return;
  _downloadICS([e], 'manutencao.ics');
}

function exportAllICS(){
  if(!_forecastEvents.length){ showSyncToast('Nenhum evento na previsão.'); return; }
  _downloadICS(_forecastEvents, 'manutencao-periodica.ics');
}

function _downloadICS(evts, filename){
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Manutencao Periodica//PT','CALSCALE:GREGORIAN'];
  evts.forEach(e=>{
    const d = _fmtISODate(e.date);
    const uid = 'manut-'+d+'-'+Math.random().toString(36).slice(2)+'@manut.app';
    const esc = s => s.replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
    lines.push('BEGIN:VEVENT',`UID:${uid}`,`DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`,`SUMMARY:🔧 ${esc(e.title)}`,`DESCRIPTION:${esc(e.sub)}`,'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// Close modal on backdrop click
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

initDate();
importFromHash();
renderAll();
initFirebase();
</script>
